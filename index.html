<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARSAL TRADING PRO - ELITE SECURE</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0e14; --card: #151921; --text: #ffffff; --accent: #ff4757; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .login-box { text-align: center; margin-top: 20vh; border: 1px solid var(--primary); padding: 40px; border-radius: 15px; background: var(--card); }
        .dashboard { display: none; max-width: 900px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        button { background: var(--primary); border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login" class="login-box">
        <h2>Enter Access Key</h2>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkPass()">Login to Elite Dashboard</button>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard" class="dashboard">
        <h1>ARSAL TRADING PRO ELITE</h1>
        
        <div class="card">
            <h3>Market Sentiment</h3>
            <div id="sentiment-meter" style="height:20px; background:linear-gradient(90deg, var(--accent), var(--primary)); border-radius:10px;"></div>
            <p id="sentiment-text">Status: Ready for Analysis</p>
            <button onclick="analyzeSentiment()">Scan Markets</button>
        </div>

        <div class="card">
            <h3>Smart Risk Calculator</h3>
            <input type="number" id="capital" placeholder="Enter Capital ($)">
            <input type="number" id="risk" placeholder="Risk Per Trade (%)">
            <button onclick="calculateRisk()" style="background-color: var(--accent); color: white;">Calculate Lot Size</button>
            <div id="result" style="margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value == "arsal123") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert("Wrong Key!"); }
        }
        function analyzeSentiment() { document.getElementById('sentiment-text').innerText = "Current Trend: STRONG BUYING PRESSURE Detected."; }
        function calculateRisk() {
            let cap = document.getElementById('capital').value;
            let risk = document.getElementById('risk').value;
            let amount = (cap * risk) / 100;
            document.getElementById('result').innerText = "Max Risk Amount: $" + amount.toFixed(2);
        }
    </script>
</body>
</html>
