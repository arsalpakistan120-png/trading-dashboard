<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ArsalTrade Elite | Official Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white">

    <!-- Header -->
    <header class="p-4 border-b border-blue-600 bg-blue-900 flex justify-between">
        <h1 class="text-2xl font-bold">ARSALTRADE ELITE</h1>
        <div class="timer">Trial Ending in 30 Days</div>
    </header>

    <div class="grid grid-cols-12 gap-2 h-screen p-2">
        <!-- Watchlist -->
        <aside class="col-span-3 bg-gray-800 p-4 rounded" id="market-list">Loading Markets...</aside>
        
        <!-- Chart -->
        <main class="col-span-6 bg-black rounded" id="chart">CHART AREA</main>
        
        <!-- Calculator -->
        <aside class="col-span-3 bg-gray-800 p-4 rounded">
            <h2 class="mb-4">Risk Calculator</h2>
            <input type="number" id="bal" class="w-full p-2 text-black mb-2" placeholder="Balance">
            <button id="calc-btn" class="bg-blue-600 p-2 w-full">CALCULATE</button>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
